<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>圖片文字編輯器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;background:#2b2b2b;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:5px;padding:6px 10px;background:#1a1a1a;flex-shrink:0;flex-wrap:wrap;}
#toolbar input[type=file]{display:none;}
.tbtn{font-size:12px;padding:5px 12px;border:none;border-radius:5px;cursor:pointer;font-weight:700;color:#fff;}
.tbtn:hover{filter:brightness(1.2);}
.tbtn.blue{background:#3a80c8;}
.tbtn.orange{background:#b06010;}
.tbtn.gray{background:#555;}
.tbtn.red{background:#a02020;}
.tbtn.purple{background:#5a3080;}
.tbtn.brown{background:#7a4010;}
.tbtn.active{outline:2px solid #fff;outline-offset:1px;}
label.tbtn{display:inline-block;}
.sep{width:1px;height:22px;background:#444;margin:0 3px;}
#modetip{font-size:11px;color:#aaa;padding:0 6px;flex:1;}

/* Main layout */
#main{display:flex;flex:1;overflow:hidden;}

/* Canvas */
#cvwrap{flex:1;overflow:auto;background:#555;display:flex;align-items:flex-start;justify-content:center;padding:14px;}
#stage{position:relative;display:none;flex-shrink:0;}
#base-canvas{display:block;}
#ui-canvas{position:absolute;top:0;left:0;pointer-events:none;}
#hit-canvas{position:absolute;top:0;left:0;cursor:crosshair;}
#tb-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#no-img{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#bbb;font-size:14px;height:100%;width:100%;}

/* Right panel */
#panel{width:260px;background:#fff;border-left:1px solid #ccc;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#ptop{padding:12px;background:#f5f5f5;border-bottom:2px solid #e0e0e0;flex-shrink:0;}
#ptop h2{font-size:13px;font-weight:700;color:#333;margin-bottom:10px;}
.pbtn{width:100%;padding:9px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;margin-bottom:5px;}
.pbtn:hover{filter:brightness(1.1);}
.pbtn.g{background:#2d7a1f;}
.pbtn.b{background:#1a5a8a;}
.pbtn.r{background:#a02020;}
.out-row{display:flex;gap:5px;margin-top:2px;}
.out-row button{flex:1;padding:7px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;}
.ob{background:#5a3080;}.oj{background:#7a4010;}

#pscroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.sec{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee;padding-bottom:3px;margin-top:4px;}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:11px;color:#555;}
.fld textarea{font-size:13px;padding:6px;border:1px solid #ccc;border-radius:4px;resize:vertical;height:56px;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;width:100%;}
.fld select,.fld input[type=number]{font-size:12px;padding:5px 7px;border:1px solid #ccc;border-radius:4px;width:100%;}
.color-row{display:flex;align-items:center;gap:5px;}
.color-row label{font-size:11px;color:#555;width:38px;flex-shrink:0;}
.color-row input[type=color]{width:34px;height:28px;border:1px solid #ccc;border-radius:4px;padding:2px;cursor:pointer;flex-shrink:0;}
.color-row .chex{font-size:11px;color:#444;flex:1;font-family:monospace;}
.color-row .dbtn{background:#0e7a6a;color:#fff;border:none;border-radius:4px;font-size:12px;padding:2px 6px;cursor:pointer;flex-shrink:0;}
.bold-btn{padding:4px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;margin-top:2px;}
.bold-btn.on{background:#333;color:#fff;border-color:#333;}
#step-hint{background:#fff8e0;border:1px solid #f0d060;border-radius:6px;padding:8px 10px;font-size:11px;color:#665500;line-height:1.6;}
#step-hint b{color:#333;}

/* Text boxes */
.tbox{position:absolute;cursor:move;overflow:hidden;}
.tbox.sel{outline:2px solid #ff6600;outline-offset:1px;}
.tbox .tc{width:100%;height:100%;outline:none;border:none;background:transparent;padding:4px 6px;word-break:break-all;line-height:1.4;display:flex;align-items:center;overflow:hidden;cursor:move;}
.tbox.editing .tc{cursor:text;}
.tbox .xbtn{position:absolute;top:-10px;right:-10px;width:20px;height:20px;background:#dd0000;color:#fff;border-radius:50%;font-size:12px;line-height:20px;text-align:center;cursor:pointer;display:none;font-weight:900;z-index:10;pointer-events:auto;}
.tbox .rbtn{position:absolute;bottom:-6px;right:-6px;width:13px;height:13px;background:#ff6600;border-radius:2px;cursor:se-resize;display:none;z-index:10;pointer-events:auto;}
.tbox.sel .xbtn,.tbox.sel .rbtn{display:block;}

/* Confirm popup */
#confirm-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:10px;padding:20px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:280px;}
#confirm-popup h3{font-size:13px;font-weight:700;color:#333;margin-bottom:12px;}
.cp-color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cp-color-row label{font-size:12px;color:#555;width:50px;}
.cp-color-row input[type=color]{width:36px;height:30px;border:1px solid #ccc;border-radius:4px;padding:2px;cursor:pointer;}
.cp-color-row .chex{font-size:12px;font-family:monospace;color:#333;flex:1;}
.cp-dbtn{background:#0e7a6a;color:#fff;border:none;border-radius:4px;font-size:12px;padding:3px 8px;cursor:pointer;}
#preview-box{width:100%;height:60px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:10px 0;border:1px solid #eee;overflow:hidden;word-break:break-all;padding:6px;}
.cp-actions{display:flex;gap:8px;margin-top:8px;}
.cp-ok{flex:1;padding:9px;background:#2d7a1f;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;}
.cp-cancel{padding:9px 14px;background:#aaa;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;}

/* Dropper */
#dp{display:none;position:fixed;pointer-events:none;z-index:9999;background:#111;border:2px solid #fff;border-radius:4px;padding:4px 7px;font-size:11px;color:#fff;font-family:monospace;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.5);}
#dp-sw{width:16px;height:16px;border-radius:2px;flex-shrink:0;}
</style>
</head>
<body>

<div id="toolbar">
  <input type="file" id="fi" accept="image/*">
  <label class="tbtn blue" for="fi">📁 載入圖片</label>
  <div class="sep"></div>
  <button class="tbtn orange active" id="btnSel" onclick="setMode('sel')">✏️ 框選放置</button>
  <button class="tbtn gray" id="btnMove" onclick="setMode('move')">↖ 移動編輯</button>
  <div class="sep"></div>
  <button class="tbtn gray" onclick="undo()">↩ 復原</button>
  <button class="tbtn red" onclick="delSel()">🗑 刪除</button>
  <div class="sep"></div>
  <button class="tbtn purple" onclick="doExport('png')">⬇ PNG</button>
  <button class="tbtn brown" onclick="doExport('jpg')">⬇ JPG</button>
  <span id="modetip">步驟①先在右側設定文字 → 步驟②框選圖片上要放置的位置</span>
</div>

<!-- Dropper -->
<div id="dp"><div id="dp-sw"></div><span id="dp-hex">#------</span></div>

<!-- Confirm popup -->
<div id="confirm-popup">
  <h3>✅ 確認套用設定</h3>
  <div class="cp-color-row">
    <label>底色：</label>
    <input type="color" id="cpBg" value="#f0f7e6" oninput="updatePreview()">
    <span class="chex" id="cpBgHex">#f0f7e6</span>
    <button class="cp-dbtn" onclick="startDrop('cpBg')">💧 吸色</button>
  </div>
  <div id="preview-box">預覽文字</div>
  <div style="font-size:11px;color:#888;margin-bottom:4px;">💡 確認文字和底色後點套用</div>
  <div class="cp-actions">
    <button class="cp-cancel" onclick="cancelConfirm()">取消</button>
    <button class="cp-ok" onclick="confirmApply()">✔ 套用</button>
  </div>
</div>

<div id="main">
  <div id="cvwrap">
    <div id="no-img">
      <div style="font-size:50px;">🖼️</div>
      <div>點「📁 載入圖片」開始</div>
      <div style="font-size:12px;color:#999;">支援 PNG / JPG</div>
    </div>
    <div id="stage">
      <canvas id="base-canvas"></canvas>
      <canvas id="ui-canvas"></canvas>
      <canvas id="hit-canvas"></canvas>
      <div id="tb-layer"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="panel">
    <div id="ptop">
      <h2>⚙️ 文字設定</h2>
      <button class="pbtn g" onclick="addManual()">＋ 手動新增方塊</button>
      <div class="out-row">
        <button class="ob" onclick="doExport('png')">⬇ PNG</button>
        <button class="oj" onclick="doExport('jpg')">⬇ JPG</button>
      </div>
    </div>
    <div id="pscroll">
      <div id="step-hint">
        <b>① 先在這裡設定文字內容和格式</b><br>
        <b>② 再到圖片上框選要放置的位置</b><br>
        <b>③ 確認底色後套用</b>
      </div>

      <div class="sec">文字內容</div>
      <div class="fld">
        <label>輸入文字（Enter 換行）</label>
        <textarea id="pText" placeholder="輸入要放上去的文字...">新文字</textarea>
      </div>

      <div class="sec">字型設定</div>
      <div class="fld">
        <label>字型</label>
        <select id="pFont"></select>
      </div>
      <div class="fld">
        <label>字體大小 (px)</label>
        <input type="number" id="pSize" value="24" min="6" max="300">
      </div>
      <button id="pBold" class="bold-btn" onclick="toggleBold()"><b>B</b> 粗體</button>

      <div class="sec">顏色設定</div>
      <div class="color-row">
        <label>字色：</label>
        <input type="color" id="pFg" value="#000000" oninput="syncHex('pFg','pFgHex')">
        <span class="chex" id="pFgHex">#000000</span>
        <button class="dbtn" onclick="startDrop('pFg')">💧</button>
      </div>
      <div class="color-row" style="margin-top:4px;">
        <label>底色：</label>
        <input type="color" id="pBg" value="#f0f7e6" oninput="syncHex('pBg','pBgHex')">
        <span class="chex" id="pBgHex">#f0f7e6</span>
        <button class="dbtn" onclick="startDrop('pBg')">💧</button>
      </div>
      <div style="margin-top:4px;">
        <button class="bold-btn" id="pTransBtn" onclick="togglePanelTransparent()">□ 透明底色</button>
      </div>

      <div class="sec">對齊</div>
      <div class="fld">
        <select id="pAlign">
          <option value="center">置中</option>
          <option value="left">靠左</option>
          <option value="right">靠右</option>
        </select>
      </div>

      <div class="sec" style="margin-top:8px;">已選取方塊</div>
      <button class="pbtn b" onclick="applyToSelected()" style="margin-top:2px;">🔄 套用設定到選取方塊</button>
      <button class="pbtn r" onclick="delSel()" style="margin-top:2px;">🗑 刪除選取方塊</button>
    </div>
  </div>
</div>

<script>
const baseCv=document.getElementById('base-canvas');
const uiCv=document.getElementById('ui-canvas');
const hitCv=document.getElementById('hit-canvas');
const bCtx=baseCv.getContext('2d');
const uCtx=uiCv.getContext('2d');
const stage=document.getElementById('stage');
const tbLayer=document.getElementById('tb-layer');
const noImg=document.getElementById('no-img');
const modetip=document.getElementById('modetip');
const dp=document.getElementById('dp');
const confirmPopup=document.getElementById('confirm-popup');

let img=null, coverRects=[], boxes=[], selId=null, idCtr=0;
let mode='sel', dropTarget=null, prevMode='sel';
let drawing=false, sx,sy, curSel=null;
let dragId=null, dragOx,dragOy;
let resId=null, resW0,resH0,rMx,rMy;
let isBold=false, panelTransparent=false;
let pendingSel=null;

// ── Detect system fonts ──
const FONTS=[
  {name:'微軟正黑體', val:"'Microsoft JhengHei','Noto Sans TC',sans-serif"},
  {name:'微軟雅黑', val:"'Microsoft YaHei',sans-serif"},
  {name:'標楷體', val:"'DFKai-SB','BiauKai',serif"},
  {name:'新細明體', val:"'PMingLiU','MingLiU',serif"},
  {name:'細明體', val:"'MingLiU',serif"},
  {name:'黑體-繁', val:"'Heiti TC','黑體-繁',sans-serif"},
  {name:'蘋方-繁', val:"'PingFang TC','蘋方-繁',sans-serif"},
  {name:'Arial', val:"Arial,sans-serif"},
  {name:'Arial Black', val:"'Arial Black',sans-serif"},
  {name:'Verdana', val:"Verdana,sans-serif"},
  {name:'Georgia', val:"Georgia,serif"},
  {name:'Times New Roman', val:"'Times New Roman',serif"},
  {name:'Courier New', val:"'Courier New',monospace"},
  {name:'Impact', val:"Impact,sans-serif"},
  {name:'Tahoma', val:"Tahoma,sans-serif"},
  {name:'Trebuchet MS', val:"'Trebuchet MS',sans-serif"},
];

function detectFonts(){
  const canvas=document.createElement('canvas');
  canvas.width=200; canvas.height=30;
  const ctx=canvas.getContext('2d');
  const base='monospace';
  const testStr='測試ABCabc123';
  ctx.font='20px '+base;
  const baseW=ctx.measureText(testStr).width;
  const sel=document.getElementById('pFont');
  sel.innerHTML='';
  FONTS.forEach(f=>{
    ctx.font='20px '+f.val+','+base;
    const w=ctx.measureText(testStr).width;
    // Add all fonts (show indicator if likely available)
    const available=(w!==baseW)||(f.val.includes('sans-serif')||f.val.includes('serif'));
    const opt=document.createElement('option');
    opt.value=f.val; opt.textContent=f.name+(w!==baseW?' ✓':'');
    sel.appendChild(opt);
  });
}
detectFonts();

// ── Load image ──
document.getElementById('fi').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    img=new Image();
    img.onload=()=>{
      baseCv.width=uiCv.width=hitCv.width=img.width;
      baseCv.height=uiCv.height=hitCv.height=img.height;
      stage.style.width=img.width+'px';
      coverRects=[]; boxes=[]; selId=null; curSel=null;
      tbLayer.innerHTML='';
      noImg.style.display='none'; stage.style.display='inline-block';
      drawBase();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
};

function drawBase(){
  if(!img)return;
  bCtx.clearRect(0,0,baseCv.width,baseCv.height);
  bCtx.drawImage(img,0,0);
  coverRects.forEach(r=>{bCtx.fillStyle=r.c; bCtx.fillRect(r.x,r.y,r.w,r.h);});
}

function drawUI(){
  uCtx.clearRect(0,0,uiCv.width,uiCv.h);
  uCtx.clearRect(0,0,uiCv.width,uiCv.height);
  if(curSel&&curSel.w>0){
    uCtx.strokeStyle='#ff8800'; uCtx.lineWidth=2; uCtx.setLineDash([5,3]);
    uCtx.strokeRect(curSel.x,curSel.y,curSel.w,curSel.h);
    uCtx.fillStyle='rgba(255,136,0,0.07)'; uCtx.fillRect(curSel.x,curSel.y,curSel.w,curSel.h);
    uCtx.setLineDash([]);
  }
}

// ── Mode ──
function setMode(m){
  mode=m;
  ['btnSel','btnMove'].forEach(id=>{document.getElementById(id)?.classList.remove('active');});
  if(m==='sel'){
    document.getElementById('btnSel').classList.add('active');
    hitCv.style.cursor='crosshair'; hitCv.style.pointerEvents='auto';
    tbLayer.style.pointerEvents='none';
    modetip.textContent='① 右側設定好文字 → ② 在圖片上拖曳框選放置位置';
  } else if(m==='move'){
    document.getElementById('btnMove').classList.add('active');
    hitCv.style.cursor='default'; hitCv.style.pointerEvents='none';
    tbLayer.style.pointerEvents='auto';
    modetip.textContent='移動模式：拖曳方塊移動 | 雙擊編輯文字 | 右下角拖曳調整大小';
  } else if(m==='dropper'){
    hitCv.style.cursor='cell'; hitCv.style.pointerEvents='auto';
    tbLayer.style.pointerEvents='none';
  }
  if(m!=='dropper') dp.style.display='none';
}

// ── Dropper ──
function startDrop(target){
  if(!img){alert('請先載入圖片！');return;}
  dropTarget=target;
  prevMode=mode==='dropper'?prevMode:mode;
  mode='dropper';
  hitCv.style.cursor='cell'; hitCv.style.pointerEvents='auto';
  tbLayer.style.pointerEvents='none';
  dp.style.display='flex';
  modetip.textContent='💧 點圖片任意位置吸色 | Esc 取消';
  document.addEventListener('keydown',escDrop);
}
function escDrop(e){if(e.key==='Escape')exitDrop();}
function exitDrop(){document.removeEventListener('keydown',escDrop); dp.style.display='none'; setMode(prevMode);}

function sample(ix,iy){
  const x=Math.max(0,Math.min(Math.round(ix),baseCv.width-1));
  const y=Math.max(0,Math.min(Math.round(iy),baseCv.height-1));
  const d=bCtx.getImageData(x,y,1,1).data;
  return '#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function syncHex(colId,hexId){
  document.getElementById(hexId).textContent=document.getElementById(colId).value;
}

// ── Hit canvas ──
function scPos(e){
  const rect=hitCv.getBoundingClientRect(), sc=hitCv.width/rect.width;
  return{x:(e.clientX-rect.left)*sc,y:(e.clientY-rect.top)*sc};
}

hitCv.addEventListener('mousemove',e=>{
  if(!img)return;
  if(mode==='dropper'){
    const p=scPos(e),h=sample(p.x,p.y);
    document.getElementById('dp-sw').style.background=h;
    document.getElementById('dp-hex').textContent=h;
    dp.style.left=(e.clientX+14)+'px'; dp.style.top=(e.clientY-8)+'px';
    return;
  }
  if(drawing&&mode==='sel'){
    const p=scPos(e);
    curSel={x:Math.min(sx,p.x),y:Math.min(sy,p.y),w:Math.abs(p.x-sx),h:Math.abs(p.y-sy)};
    drawUI();
  }
});

hitCv.addEventListener('mousedown',e=>{
  if(!img)return;
  const p=scPos(e);
  if(mode==='dropper'){
    const h=sample(p.x,p.y);
    const el=document.getElementById(dropTarget);
    if(el){
      el.value=h;
      // Sync hex displays
      if(dropTarget==='pFg') document.getElementById('pFgHex').textContent=h;
      if(dropTarget==='pBg') document.getElementById('pBgHex').textContent=h;
      if(dropTarget==='cpBg'){document.getElementById('cpBgHex').textContent=h; updatePreview();}
    }
    exitDrop(); return;
  }
  if(mode==='sel'){drawing=true; sx=p.x; sy=p.y; curSel={x:p.x,y:p.y,w:0,h:0};}
});

hitCv.addEventListener('mouseup',e=>{
  if(mode==='sel'&&drawing){
    drawing=false;
    if(curSel&&curSel.w>6&&curSel.h>6){
      // Show confirm popup
      pendingSel={...curSel};
      // Auto-sample bg from selection center
      const h=sample(curSel.x+curSel.w/2, curSel.y+curSel.h/2);
      document.getElementById('cpBg').value=h;
      document.getElementById('cpBgHex').textContent=h;
      updatePreview();
      confirmPopup.style.display='block';
      curSel=null; drawUI();
    } else {
      curSel=null; drawUI();
    }
  }
});

// ── Confirm popup ──
function updatePreview(){
  const bg=document.getElementById('cpBg').value;
  document.getElementById('cpBgHex').textContent=bg;
  const text=document.getElementById('pText').value||'新文字';
  const fg=document.getElementById('pFg').value;
  const size=Math.min(parseInt(document.getElementById('pSize').value)||24, 28);
  const font=document.getElementById('pFont').value;
  const bold=isBold;
  const pb=document.getElementById('preview-box');
  pb.style.background=panelTransparent?'repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0 / 12px 12px':bg;
  pb.style.color=fg;
  pb.style.fontSize=size+'px';
  pb.style.fontWeight=bold?'700':'400';
  pb.style.fontFamily=font;
  pb.style.textAlign=document.getElementById('pAlign').value;
  pb.textContent=text.split('\n')[0];
}

function cancelConfirm(){
  confirmPopup.style.display='none';
  pendingSel=null;
}

function confirmApply(){
  confirmPopup.style.display='none';
  if(!pendingSel)return;
  const sel=pendingSel; pendingSel=null;
  const bg=document.getElementById('cpBg').value;

  // Cover original permanently
  if(!panelTransparent){
    bCtx.fillStyle=bg;
    bCtx.fillRect(Math.round(sel.x),Math.round(sel.y),Math.round(sel.w),Math.round(sel.h));
    coverRects.push({x:sel.x,y:sel.y,w:sel.w,h:sel.h,c:bg});
  }

  // Create text box
  makeBox(sel.x,sel.y,sel.w,sel.h,bg);
}

// ── Text box ──
function makeBox(x,y,w,h,bgColor){
  idCtr++;
  const text=document.getElementById('pText').value||'新文字';
  const fg=document.getElementById('pFg').value;
  const size=parseInt(document.getElementById('pSize').value)||24;
  const font=document.getElementById('pFont').value;
  const align=document.getElementById('pAlign').value;
  const b={id:idCtr,x,y,w,h,text,size,bold:isBold,font,bg:bgColor,fg,align,transparent:panelTransparent};
  boxes.push(b);
  const el=mkEl(b);
  tbLayer.appendChild(el);
  selectBox(b.id);
  setMode('move');
}

function addManual(){
  if(!img){alert('請先載入圖片！');return;}
  makeBox(img.width*0.2, img.height*0.4, 220, 70, document.getElementById('pBg').value);
}

function mkEl(b){
  const sc=getScale();
  const el=document.createElement('div');
  el.id='b'+b.id; el.className='tbox';
  styleEl(el,b,sc);

  const tc=document.createElement('div');
  tc.className='tc';
  styleTc(tc,b,sc);
  tc.contentEditable='false';
  tc.textContent=b.text;
  tc.oninput=()=>{b.text=tc.innerText;};
  tc.onblur=()=>{el.classList.remove('editing');tc.contentEditable='false';tc.style.cursor='move';b.text=tc.innerText;};
  el.appendChild(tc);

  el.ondblclick=ev=>{
    ev.stopPropagation(); selectBox(b.id);
    el.classList.add('editing');
    tc.contentEditable='true'; tc.style.cursor='text'; tc.focus();
  };
  el.onmousedown=ev=>{
    if(ev.target.className==='xbtn'||ev.target.className==='rbtn')return;
    if(el.classList.contains('editing'))return;
    ev.preventDefault(); selectBox(b.id);
    const r=el.getBoundingClientRect();
    dragId=b.id; dragOx=ev.clientX-r.left; dragOy=ev.clientY-r.top;
  };

  const xbtn=document.createElement('div');
  xbtn.className='xbtn'; xbtn.textContent='✕';
  xbtn.onmousedown=ev=>{ev.stopPropagation(); removeBox(b.id);};
  el.appendChild(xbtn);

  const rbtn=document.createElement('div');
  rbtn.className='rbtn';
  rbtn.onmousedown=ev=>{
    ev.stopPropagation(); ev.preventDefault();
    resId=b.id; resW0=b.w; resH0=b.h; rMx=ev.clientX; rMy=ev.clientY;
  };
  el.appendChild(rbtn);
  return el;
}

function styleEl(el,b,sc){
  el.style.cssText=`position:absolute;left:${Math.round(b.x*sc)}px;top:${Math.round(b.y*sc)}px;width:${Math.round(b.w*sc)}px;height:${Math.round(b.h*sc)}px;background:${b.transparent?'transparent':b.bg};overflow:hidden;cursor:move;`;
}
function styleTc(tc,b,sc){
  const jc=b.align==='left'?'flex-start':b.align==='right'?'flex-end':'center';
  tc.style.cssText=`width:100%;height:100%;font-size:${Math.round(b.size*sc)}px;font-weight:${b.bold?700:400};color:${b.fg};font-family:${b.font};text-align:${b.align};display:flex;align-items:center;justify-content:${jc};padding:4px 6px;word-break:break-all;line-height:1.4;overflow:hidden;cursor:move;outline:none;border:none;background:transparent;`;
}

function getScale(){return baseCv.getBoundingClientRect().width/baseCv.width;}

function selectBox(id){
  selId=id;
  document.querySelectorAll('.tbox').forEach(el=>el.classList.remove('sel'));
  const el=document.getElementById('b'+id); if(el)el.classList.add('sel');
  const b=boxes.find(x=>x.id===id);
  if(b){
    document.getElementById('pText').value=b.text;
    document.getElementById('pFont').value=b.font;
    document.getElementById('pSize').value=b.size;
    document.getElementById('pFg').value=b.fg;
    document.getElementById('pFgHex').textContent=b.fg;
    document.getElementById('pBg').value=b.bg;
    document.getElementById('pBgHex').textContent=b.bg;
    document.getElementById('pAlign').value=b.align;
    isBold=b.bold;
    document.getElementById('pBold').className='bold-btn'+(b.bold?' on':'');
    panelTransparent=b.transparent;
    document.getElementById('pTransBtn').className='bold-btn'+(b.transparent?' on':'');
  }
}

function removeBox(id){
  boxes=boxes.filter(b=>b.id!==id);
  document.getElementById('b'+id)?.remove();
  if(selId===id) selId=null;
}
function delSel(){if(selId)removeBox(selId);}

function applyToSelected(){
  if(!selId){alert('請先選取一個文字方塊！');return;}
  const b=boxes.find(x=>x.id===selId); if(!b)return;
  b.text=document.getElementById('pText').value||b.text;
  b.font=document.getElementById('pFont').value;
  b.size=parseInt(document.getElementById('pSize').value)||b.size;
  b.fg=document.getElementById('pFg').value;
  b.bg=document.getElementById('pBg').value;
  b.align=document.getElementById('pAlign').value;
  b.bold=isBold;
  b.transparent=panelTransparent;
  const sc=getScale();
  const el=document.getElementById('b'+b.id); if(!el)return;
  styleEl(el,b,sc);
  const tc=el.querySelector('.tc'); if(tc){styleTc(tc,b,sc); tc.textContent=b.text;}
}

function toggleBold(){
  isBold=!isBold;
  document.getElementById('pBold').className='bold-btn'+(isBold?' on':'');
  updatePreview();
}

function togglePanelTransparent(){
  panelTransparent=!panelTransparent;
  document.getElementById('pTransBtn').className='bold-btn'+(panelTransparent?' on':'');
}

function undo(){
  if(coverRects.length){
    const last=coverRects.pop();
    const associated=boxes.find(b=>Math.abs(b.x-last.x)<3&&Math.abs(b.y-last.y)<3);
    if(associated)removeBox(associated.id);
    drawBase();
  }
}

// ── Drag / Resize ──
document.addEventListener('mousemove',e=>{
  if(dragId){
    const b=boxes.find(x=>x.id===dragId); if(!b)return;
    const sr=stage.getBoundingClientRect(), sc=getScale();
    b.x=Math.max(0,Math.min((e.clientX-sr.left-dragOx)/sc,baseCv.width-b.w));
    b.y=Math.max(0,Math.min((e.clientY-sr.top-dragOy)/sc,baseCv.height-b.h));
    const el=document.getElementById('b'+b.id);
    if(el){el.style.left=Math.round(b.x*sc)+'px'; el.style.top=Math.round(b.y*sc)+'px';}
  }
  if(resId){
    const b=boxes.find(x=>x.id===resId); if(!b)return;
    const sc=getScale();
    b.w=Math.max(30,resW0+(e.clientX-rMx)/sc);
    b.h=Math.max(18,resH0+(e.clientY-rMy)/sc);
    const el=document.getElementById('b'+b.id);
    if(el){
      el.style.width=Math.round(b.w*sc)+'px'; el.style.height=Math.round(b.h*sc)+'px';
      const tc=el.querySelector('.tc'); if(tc)styleTc(tc,b,sc);
    }
  }
});
document.addEventListener('mouseup',()=>{dragId=null;resId=null;});
document.getElementById('cvwrap').addEventListener('mousedown',e=>{
  if(!e.target.closest('.tbox')&&!e.target.closest('#confirm-popup')){
    document.querySelectorAll('.tbox').forEach(el=>el.classList.remove('sel'));
    selId=null;
  }
});

// ── Export ──
function doExport(type){
  if(!img){alert('請先載入圖片！');return;}
  const ec=document.createElement('canvas');
  ec.width=baseCv.width; ec.height=baseCv.height;
  const ex=ec.getContext('2d');
  ex.drawImage(baseCv,0,0);
  boxes.forEach(b=>{
    if(!b.transparent){ex.fillStyle=b.bg; ex.fillRect(b.x,b.y,b.w,b.h);}
    ex.fillStyle=b.fg;
    ex.font=(b.bold?'700 ':'400 ')+b.size+'px '+b.font;
    ex.textAlign=b.align==='left'?'left':b.align==='right'?'right':'center';
    ex.textBaseline='middle';
    const lines=b.text.split('\n'), lh=b.size*1.4, total=lines.length*lh;
    let ty=b.y+(b.h-total)/2+lh/2;
    let tx=b.align==='center'?b.x+b.w/2:b.align==='left'?b.x+8:b.x+b.w-8;
    lines.forEach(l=>{ex.fillText(l,tx,ty);ty+=lh;});
  });
  const a=document.createElement('a');
  a.download='edited.'+type;
  a.href=ec.toDataURL(type==='png'?'image/png':'image/jpeg',0.95);
  a.click();
}

setMode('sel');
</script>
