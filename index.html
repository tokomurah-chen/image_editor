<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>圖片文字編輯器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;background:#2b2b2b;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

#toolbar{display:flex;align-items:center;gap:5px;padding:6px 10px;background:#1a1a1a;flex-shrink:0;flex-wrap:wrap;}
#toolbar input[type=file]{display:none;}
.tbtn{font-size:12px;padding:5px 11px;border:none;border-radius:5px;cursor:pointer;font-weight:700;color:#fff;transition:filter .15s;}
.tbtn:hover{filter:brightness(1.2);}
.tbtn.blue{background:#3a80c8;}
.tbtn.orange{background:#b06010;}
.tbtn.green{background:#2d7a1f;}
.tbtn.gray{background:#555;}
.tbtn.red{background:#a02020;}
.tbtn.active{outline:2px solid #fff;outline-offset:1px;}
label.tbtn{display:inline-block;}
#modetip{font-size:11px;color:#aaa;padding:0 6px;}

/* Format bar - shows when text box selected */
#fmtbar{display:none;align-items:center;gap:6px;padding:5px 10px;background:#2a2a2a;border-top:1px solid #444;flex-shrink:0;flex-wrap:wrap;}
#fmtbar select,#fmtbar input{font-size:12px;padding:3px 6px;border:1px solid #555;border-radius:4px;background:#333;color:#fff;}
#fmtbar input[type=number]{width:58px;}
#fmtbar input[type=color]{width:32px;height:26px;padding:1px;cursor:pointer;}
.fmtlbl{font-size:11px;color:#aaa;}
.fmtsep{width:1px;height:20px;background:#555;margin:0 3px;}

#main{display:flex;flex:1;overflow:hidden;}
#canvas-wrap{flex:1;overflow:auto;background:#555;display:flex;align-items:flex-start;justify-content:center;padding:12px;}
#stage{position:relative;display:none;flex-shrink:0;}
#base-canvas{display:block;}
#ui-canvas{position:absolute;top:0;left:0;pointer-events:none;}
#hit-canvas{position:absolute;top:0;left:0;}
#tb-layer{position:absolute;top:0;left:0;width:100%;height:100%;}
#no-img{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#bbb;font-size:14px;height:400px;width:100%;}

/* Text boxes */
.tbox{position:absolute;border:2px dashed #4a90d9;cursor:move;min-width:30px;min-height:20px;}
.tbox:hover{border-color:#7ab8f5;}
.tbox.sel{border:2px solid #ff6600!important;box-shadow:0 0 0 2px rgba(255,102,0,0.3);}
.tbox .tcontent{width:100%;height:100%;outline:none;border:none;background:transparent;resize:none;cursor:move;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;padding:4px 6px;word-break:break-all;line-height:1.4;overflow:hidden;}
.tbox.editing .tcontent{cursor:text;}
.tbox .xbtn{position:absolute;top:-11px;right:-11px;width:22px;height:22px;background:#dd0000;color:#fff;border-radius:50%;font-size:13px;line-height:22px;text-align:center;cursor:pointer;display:none;font-weight:900;z-index:20;pointer-events:auto;}
.tbox .rbtn{position:absolute;bottom:-6px;right:-6px;width:14px;height:14px;background:#ff6600;border-radius:3px;cursor:se-resize;display:none;z-index:20;pointer-events:auto;}
.tbox.sel .xbtn,.tbox.sel .rbtn{display:block;}

/* Dropper preview */
#dropper-preview{display:none;position:fixed;pointer-events:none;z-index:9999;border:2px solid #fff;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.5);width:80px;padding:4px 6px;background:#222;color:#fff;font-size:11px;font-family:monospace;align-items:center;gap:5px;}
#dp-swatch{width:18px;height:18px;border-radius:3px;flex-shrink:0;}
</style>
</head>
<body>

<div id="toolbar">
  <input type="file" id="fileInput" accept="image/*">
  <label class="tbtn blue" for="fileInput">📁 載入圖片</label>
  <div class="fmtsep"></div>
  <button class="tbtn orange active" id="btnErase" onclick="setMode('erase')">🖌 塗色框選</button>
  <button class="tbtn green" id="btnText" onclick="setMode('text')">＋ 文字方塊</button>
  <button class="tbtn" id="btnDrop" style="background:#0e7a6a;" onclick="openDropMenu()">💧 滴管</button>
  <div class="fmtsep"></div>
  <button class="tbtn gray" onclick="undoErase()">↩ 復原塗色</button>
  <button class="tbtn red" onclick="deleteSelected()">🗑 刪除方塊</button>
  <div class="fmtsep"></div>
  <button class="tbtn" style="background:#5a3080;" onclick="exportImg('png')">⬇ PNG</button>
  <button class="tbtn" style="background:#7a4010;" onclick="exportImg('jpg')">⬇ JPG</button>
  <span id="modetip">目前：塗色框選模式</span>
</div>

<!-- Format bar shown when text box is selected -->
<div id="fmtbar">
  <span class="fmtlbl">字型：</span>
  <select id="fmtFont" onchange="applyFmt()">
    <option value="'Microsoft JhengHei','Noto Sans TC',sans-serif">微軟正黑體</option>
    <option value="'DFKai-SB','標楷體',serif">標楷體</option>
    <option value="'SimSun','新細明體',serif">新細明體</option>
    <option value="Arial,sans-serif">Arial</option>
    <option value="'Times New Roman',serif">Times New Roman</option>
    <option value="Georgia,serif">Georgia</option>
  </select>
  <span class="fmtlbl">大小：</span>
  <input type="number" id="fmtSize" value="20" min="6" max="300" onchange="applyFmt()">
  <span class="fmtlbl">px</span>
  <div class="fmtsep"></div>
  <button id="fmtBold" onclick="toggleBold()" style="background:#555;color:#fff;border:none;border-radius:4px;padding:3px 8px;cursor:pointer;font-weight:700;font-size:13px;">B</button>
  <div class="fmtsep"></div>
  <span class="fmtlbl">底色：</span>
  <input type="color" id="fmtBg" value="#3a7020" onchange="applyFmt()">
  <button onclick="startDropper('fmt_bg')" style="background:#0e7a6a;color:#fff;border:none;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:12px;">💧</button>
  <div class="fmtsep"></div>
  <span class="fmtlbl">字色：</span>
  <input type="color" id="fmtFg" value="#ffffff" onchange="applyFmt()">
  <button onclick="startDropper('fmt_fg')" style="background:#0e7a6a;color:#fff;border:none;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:12px;">💧</button>
  <div class="fmtsep"></div>
  <span class="fmtlbl">對齊：</span>
  <select id="fmtAlign" onchange="applyFmt()">
    <option value="center">置中</option>
    <option value="left">靠左</option>
    <option value="right">靠右</option>
  </select>
  <div class="fmtsep"></div>
  <span style="font-size:11px;color:#aaa;">💡 雙擊方塊可直接編輯文字</span>
</div>

<!-- Dropper preview tooltip -->
<div id="dropper-preview">
  <div id="dp-swatch"></div>
  <span id="dp-hex">#------</span>
</div>

<div id="main">
  <div id="canvas-wrap">
    <div id="no-img">
      <div style="font-size:52px;">🖼️</div>
      <div>請點左上角「📁 載入圖片」開始</div>
      <div style="font-size:12px;color:#999;">支援 PNG / JPG</div>
    </div>
    <div id="stage">
      <canvas id="base-canvas"></canvas>
      <canvas id="ui-canvas"></canvas>
      <canvas id="hit-canvas"></canvas>
      <div id="tb-layer"></div>
    </div>
  </div>
</div>

<script>
// ── State ──
let img=null, eraseRects=[], boxes=[], selId=null, idCtr=0;
let mode='erase', dropperTarget=null, prevMode='erase';
let drawing=false, sx,sy, curSel=null;
let dragId=null, dragOx,dragOy;
let resId=null, resW0,resH0,resMx0,reMy0;
let isBold = false;

const baseCv=document.getElementById('base-canvas');
const uiCv=document.getElementById('ui-canvas');
const hitCv=document.getElementById('hit-canvas');
const bCtx=baseCv.getContext('2d');
const uCtx=uiCv.getContext('2d');
const stage=document.getElementById('stage');
const tbLayer=document.getElementById('tb-layer');
const noImg=document.getElementById('no-img');
const modetip=document.getElementById('modetip');
const fmtbar=document.getElementById('fmtbar');
const dpPreview=document.getElementById('dropper-preview');

// ── Load image ──
document.getElementById('fileInput').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    img=new Image();
    img.onload=()=>{
      baseCv.width=uiCv.width=hitCv.width=img.width;
      baseCv.height=uiCv.height=hitCv.height=img.height;
      stage.style.width=img.width+'px';
      eraseRects=[]; boxes=[]; selId=null; curSel=null;
      tbLayer.innerHTML='';
      noImg.style.display='none'; stage.style.display='inline-block';
      redrawBase();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
};

function redrawBase(){
  if(!img) return;
  bCtx.clearRect(0,0,baseCv.width,baseCv.height);
  bCtx.drawImage(img,0,0);
  eraseRects.forEach(r=>{bCtx.fillStyle=r.c; bCtx.fillRect(r.x,r.y,r.w,r.h);});
}

function redrawUI(){
  uCtx.clearRect(0,0,uiCv.width,uiCv.height);
  if(curSel){
    uCtx.strokeStyle='rgba(255,100,0,.9)'; uCtx.lineWidth=2; uCtx.setLineDash([5,3]);
    uCtx.strokeRect(curSel.x,curSel.y,curSel.w,curSel.h);
    uCtx.fillStyle='rgba(255,100,0,.08)'; uCtx.fillRect(curSel.x,curSel.y,curSel.w,curSel.h);
    uCtx.setLineDash([]);
  }
}

// ── Modes ──
function setMode(m){
  mode=m;
  ['btnErase','btnText','btnDrop'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(m==='erase') document.getElementById('btnErase').classList.add('active');
  if(m==='text')  document.getElementById('btnText').classList.add('active');
  hitCv.style.cursor=m==='erase'?'crosshair':m==='dropper'?'cell':'default';
  hitCv.style.pointerEvents=m==='text'?'none':'auto';
  tbLayer.style.pointerEvents=m==='text'?'auto':'none';
  const tips={erase:'塗色框選模式 — 拖曳框選要蓋掉的文字',text:'文字方塊模式 — 雙擊方塊直接輸入',dropper:'💧 滴管模式 — 點圖片任意位置吸色'};
  modetip.textContent='目前：'+(tips[m]||'');
  if(m!=='dropper'){dpPreview.style.display='none';}
}

// ── Dropper ──
function openDropMenu(){
  if(!img){alert('請先載入圖片！');return;}
  const menu=document.createElement('div');
  menu.style.cssText='position:fixed;top:55px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #ccc;border-radius:8px;padding:14px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);min-width:230px;';
  menu.innerHTML=`
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;">💧 滴管 — 吸色套用到：</div>
    <button onclick="startDropper('erase');this.closest('div[style]').remove()" style="width:100%;margin:3px 0;padding:8px;background:#b06010;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;">🖌 塗色顏色</button>
    <button onclick="startDropper('fmt_bg');this.closest('div[style]').remove()" style="width:100%;margin:3px 0;padding:8px;background:#2d7a1f;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;">🟩 文字底色</button>
    <button onclick="startDropper('fmt_fg');this.closest('div[style]').remove()" style="width:100%;margin:3px 0;padding:8px;background:#1a3a8a;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;">🔤 文字字色</button>
    <button onclick="this.closest('div[style]').remove()" style="width:100%;margin:6px 0 0;padding:6px;background:#aaa;color:#fff;border:none;border-radius:5px;font-size:11px;cursor:pointer;">取消</button>`;
  document.body.appendChild(menu);
}

function startDropper(target){
  if(!img){alert('請先載入圖片！');return;}
  dropperTarget=target;
  prevMode=mode==='dropper'?prevMode:mode;
  mode='dropper';
  hitCv.style.cursor='cell'; hitCv.style.pointerEvents='auto'; tbLayer.style.pointerEvents='none';
  modetip.textContent='💧 滴管：移動到圖片上選色，點擊確認 | Esc 取消';
  dpPreview.style.display='flex';
  document.addEventListener('keydown',escDropper);
}

function escDropper(e){if(e.key==='Escape'){exitDropper();}}
function exitDropper(){
  document.removeEventListener('keydown',escDropper);
  dpPreview.style.display='none';
  setMode(prevMode);
}

function sampleColor(ix,iy){
  const x=Math.max(0,Math.min(Math.round(ix),baseCv.width-1));
  const y=Math.max(0,Math.min(Math.round(iy),baseCv.height-1));
  const d=bCtx.getImageData(x,y,1,1).data;
  return '#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ── Hit canvas events ──
function getPos(e){
  const rect=hitCv.getBoundingClientRect();
  const sc=hitCv.width/rect.width;
  return{x:(e.clientX-rect.left)*sc, y:(e.clientY-rect.top)*sc};
}

hitCv.addEventListener('mousemove',e=>{
  if(!img) return;
  if(mode==='dropper'){
    const p=getPos(e); const h=sampleColor(p.x,p.y);
    document.getElementById('dp-swatch').style.background=h;
    document.getElementById('dp-hex').textContent=h;
    dpPreview.style.left=(e.clientX+14)+'px';
    dpPreview.style.top=(e.clientY-10)+'px';
    return;
  }
  if(drawing && mode==='erase'){
    const p=getPos(e);
    curSel={x:Math.min(sx,p.x),y:Math.min(sy,p.y),w:Math.abs(p.x-sx),h:Math.abs(p.y-sy)};
    redrawUI();
  }
});

hitCv.addEventListener('mousedown',e=>{
  if(!img) return;
  const p=getPos(e);
  if(mode==='dropper'){
    const h=sampleColor(p.x,p.y);
    if(dropperTarget==='erase'){document.getElementById('eraseColHidden').value=h; currentEraseColor=h;}
    else if(dropperTarget==='fmt_bg'){document.getElementById('fmtBg').value=h; applyFmt();}
    else if(dropperTarget==='fmt_fg'){document.getElementById('fmtFg').value=h; applyFmt();}
    exitDropper(); return;
  }
  if(mode==='erase'){drawing=true; sx=p.x; sy=p.y; curSel={x:p.x,y:p.y,w:0,h:0};}
});

hitCv.addEventListener('mouseup',e=>{
  if(mode==='erase' && drawing){
    drawing=false;
    if(curSel && curSel.w>5 && curSel.h>5){
      // Auto sample color + create textbox immediately
      const cx=curSel.x+curSel.w/2, cy=curSel.y+curSel.h/2;
      const h=sampleColor(cx,cy);
      currentEraseColor=h;
      // Apply erase rect immediately
      eraseRects.push({...curSel,c:h});
      // Create text box in same area
      createTextboxAt(curSel.x, curSel.y, curSel.w, curSel.h, h);
      curSel=null; redrawUI(); redrawBase();
    } else {
      curSel=null; redrawUI();
    }
  }
});

// ── Erase color ──
let currentEraseColor='#f0f7e6';
// Hidden input for erase color (dropper target)
const eraseHidden=document.createElement('input');
eraseHidden.type='color'; eraseHidden.id='eraseColHidden';
eraseHidden.style.display='none'; document.body.appendChild(eraseHidden);

function undoErase(){
  if(eraseRects.length){eraseRects.pop(); redrawBase(); modetip.textContent='已復原上一次塗色';}
}

// ── Create textbox ──
function createTextboxAt(x,y,w,h,bgColor){
  idCtr++;
  const fg = getLuminance(bgColor)>128?'#000000':'#ffffff';
  const size=Math.max(12, Math.min(Math.round(h*0.45), 60));
  const b={id:idCtr,x,y,w,h,text:'',size,weight:'700',bold:true,
            font:"'Microsoft JhengHei','Noto Sans TC',sans-serif",
            bg:bgColor,fg,align:'center'};
  boxes.push(b);
  const el=makeTboxEl(b);
  tbLayer.appendChild(el);
  selectBox(b.id);
  setMode('text');
  // Auto focus for typing
  setTimeout(()=>{
    const tc=el.querySelector('.tcontent');
    el.classList.add('editing');
    tc.style.cursor='text';
    tc.contentEditable='true';
    tc.focus();
    const range=document.createRange();
    range.selectNodeContents(tc);
    range.collapse(false);
    const sel2=window.getSelection();
    sel2.removeAllRanges(); sel2.addRange(range);
  },50);
}

function getLuminance(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000;
}

function makeTboxEl(b){
  const sc=getScale();
  const el=document.createElement('div');
  el.id='b'+b.id; el.className='tbox';
  applyTboxStyle(el,b,sc);

  const tc=document.createElement('div');
  tc.className='tcontent';
  tc.contentEditable='false';
  tc.style.fontSize=Math.round(b.size*sc)+'px';
  tc.style.fontWeight=b.bold?'700':'400';
  tc.style.color=b.fg;
  tc.style.fontFamily=b.font;
  tc.style.textAlign=b.align;
  tc.style.display='flex';
  tc.style.alignItems='center';
  tc.style.justifyContent=b.align==='left'?'flex-start':b.align==='right'?'flex-end':'center';
  tc.textContent=b.text||'';
  tc.oninput=()=>{ b.text=tc.innerText; };
  el.appendChild(tc);

  // Double click to edit
  el.ondblclick=ev=>{
    ev.stopPropagation();
    selectBox(b.id);
    el.classList.add('editing');
    tc.contentEditable='true';
    tc.style.cursor='text';
    tc.focus();
  };

  // Single click to select
  el.onmousedown=ev=>{
    if(ev.target.classList.contains('xbtn')||ev.target.classList.contains('rbtn')) return;
    if(el.classList.contains('editing')) return;
    ev.preventDefault();
    selectBox(b.id);
    const r=el.getBoundingClientRect();
    dragId=b.id; dragOx=ev.clientX-r.left; dragOy=ev.clientY-r.top;
  };

  // Blur = stop editing
  tc.onblur=()=>{
    el.classList.remove('editing');
    tc.contentEditable='false';
    tc.style.cursor='move';
    b.text=tc.innerText;
  };

  const xbtn=document.createElement('div');
  xbtn.className='xbtn'; xbtn.textContent='✕';
  xbtn.onmousedown=ev=>{ev.stopPropagation(); removeBox(b.id);};
  el.appendChild(xbtn);

  const rbtn=document.createElement('div');
  rbtn.className='rbtn';
  rbtn.onmousedown=ev=>{
    ev.stopPropagation(); ev.preventDefault();
    resId=b.id; resW0=b.w; resH0=b.h; resMx0=ev.clientX; reMy0=ev.clientY;
  };
  el.appendChild(rbtn);

  return el;
}

function applyTboxStyle(el,b,sc){
  el.style.left=Math.round(b.x*sc)+'px';
  el.style.top=Math.round(b.y*sc)+'px';
  el.style.width=Math.round(b.w*sc)+'px';
  el.style.height=Math.round(b.h*sc)+'px';
  el.style.background=b.bg;
}

function getScale(){
  return baseCv.getBoundingClientRect().width/baseCv.width;
}

function selectBox(id){
  selId=id;
  document.querySelectorAll('.tbox').forEach(el=>el.classList.remove('sel'));
  const el=document.getElementById('b'+id);
  if(el) el.classList.add('sel');
  const b=boxes.find(x=>x.id===id);
  if(b){
    document.getElementById('fmtFont').value=b.font;
    document.getElementById('fmtSize').value=b.size;
    document.getElementById('fmtBg').value=b.bg;
    document.getElementById('fmtFg').value=b.fg;
    document.getElementById('fmtAlign').value=b.align;
    isBold=b.bold;
    document.getElementById('fmtBold').style.background=b.bold?'#fff':'#555';
    document.getElementById('fmtBold').style.color=b.bold?'#333':'#fff';
    fmtbar.style.display='flex';
  }
}

function removeBox(id){
  boxes=boxes.filter(b=>b.id!==id);
  const el=document.getElementById('b'+id);
  if(el) el.remove();
  if(selId===id){selId=null; fmtbar.style.display='none';}
}

function deleteSelected(){
  if(selId) removeBox(selId);
}

function applyFmt(){
  if(!selId) return;
  const b=boxes.find(x=>x.id===selId); if(!b) return;
  b.font=document.getElementById('fmtFont').value;
  b.size=parseInt(document.getElementById('fmtSize').value)||b.size;
  b.bg=document.getElementById('fmtBg').value;
  b.fg=document.getElementById('fmtFg').value;
  b.align=document.getElementById('fmtAlign').value;
  b.bold=isBold;
  const sc=getScale();
  const el=document.getElementById('b'+b.id);
  if(el){
    applyTboxStyle(el,b,sc);
    const tc=el.querySelector('.tcontent');
    if(tc){
      tc.style.fontSize=Math.round(b.size*sc)+'px';
      tc.style.fontWeight=b.bold?'700':'400';
      tc.style.color=b.fg;
      tc.style.fontFamily=b.font;
      tc.style.textAlign=b.align;
      tc.style.justifyContent=b.align==='left'?'flex-start':b.align==='right'?'flex-end':'center';
    }
  }
}

function toggleBold(){
  isBold=!isBold;
  const btn=document.getElementById('fmtBold');
  btn.style.background=isBold?'#fff':'#555';
  btn.style.color=isBold?'#333':'#fff';
  applyFmt();
}

// Standalone add textbox (toolbar button)
function addTextboxManual(){
  if(!img){alert('請先載入圖片！');return;}
  const cx=baseCv.width*0.25, cy=baseCv.height*0.4;
  createTextboxAt(cx,cy,200,60,'#3a7020');
}

// ── Drag/Resize ──
document.addEventListener('mousemove',e=>{
  if(dragId){
    const b=boxes.find(x=>x.id===dragId); if(!b) return;
    const sr=stage.getBoundingClientRect(); const sc=getScale();
    b.x=Math.max(0,Math.min((e.clientX-sr.left-dragOx)/sc,baseCv.width-b.w));
    b.y=Math.max(0,Math.min((e.clientY-sr.top-dragOy)/sc,baseCv.height-b.h));
    const el=document.getElementById('b'+b.id);
    if(el){el.style.left=Math.round(b.x*sc)+'px'; el.style.top=Math.round(b.y*sc)+'px';}
  }
  if(resId){
    const b=boxes.find(x=>x.id===resId); if(!b) return;
    const sc=getScale();
    b.w=Math.max(40,resW0+(e.clientX-resMx0)/sc);
    b.h=Math.max(20,resH0+(e.clientY-reMy0)/sc);
    const el=document.getElementById('b'+b.id);
    if(el){
      el.style.width=Math.round(b.w*sc)+'px';
      el.style.height=Math.round(b.h*sc)+'px';
      const tc=el.querySelector('.tcontent');
      if(tc) tc.style.fontSize=Math.round(b.size*sc)+'px';
    }
  }
});
document.addEventListener('mouseup',()=>{dragId=null;resId=null;});

// Click outside deselects
document.getElementById('canvas-wrap').addEventListener('mousedown',e=>{
  if(!e.target.closest('.tbox')){
    document.querySelectorAll('.tbox').forEach(el=>el.classList.remove('sel'));
    selId=null; fmtbar.style.display='none';
  }
});

// ── Export ──
function exportImg(type){
  if(!img){alert('請先載入圖片！');return;}
  // Flatten text boxes to canvas
  const ec=document.createElement('canvas');
  ec.width=baseCv.width; ec.height=baseCv.height;
  const ectx=ec.getContext('2d');
  ectx.drawImage(baseCv,0,0);
  boxes.forEach(b=>{
    ectx.fillStyle=b.bg;
    ectx.fillRect(b.x,b.y,b.w,b.h);
    ectx.fillStyle=b.fg;
    const weight=b.bold?'700':'400';
    ectx.font=weight+' '+b.size+'px '+b.font;
    ectx.textAlign=b.align==='left'?'left':b.align==='right'?'right':'center';
    ectx.textBaseline='middle';
    const lines=b.text.split('\n');
    const lh=b.size*1.4;
    const total=lines.length*lh;
    let ty=b.y+(b.h-total)/2+lh/2;
    let tx=b.align==='center'?b.x+b.w/2:b.align==='left'?b.x+8:b.x+b.w-8;
    lines.forEach(l=>{ectx.fillText(l,tx,ty);ty+=lh;});
  });
  const a=document.createElement('a');
  a.download='edited.'+type;
  a.href=ec.toDataURL(type==='png'?'image/png':'image/jpeg',0.95);
  a.click();
}

setMode('erase');
</script>
